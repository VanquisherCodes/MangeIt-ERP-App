<style>
        .glass-card {
            background: rgba(21, 27, 45, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary/30">
<!-- Background Decoration -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute top-[20%] -right-[5%] w-[30%] h-[50%] bg-tertiary/5 blur-[100px] rounded-full"></div>
</div>
<!-- Registration Layout -->
<div class="flex flex-col min-h-screen">
<!-- Header / Identity -->
<header class="flex items-center justify-center pt-12 pb-8">
<div class="flex flex-col items-center gap-3">
<div class="w-12 h-12 rounded-xl bg-primary-container flex items-center justify-center text-on-primary-container shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">grid_view</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface">
                    Manage<span class="text-primary">It</span>
</h1>
</div>
</header>
<!-- Main Form Canvas -->
<main class="flex-grow flex items-start justify-center px-6 pb-20">
<div class="w-full max-w-md glass-card rounded-[2rem] border border-white/5 p-8 shadow-2xl relative overflow-hidden">
<!-- Form Header -->
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface">Create Account</h2>
<p class="text-on-surface-variant text-sm mt-1">Join the architectural ecosystem for professionals.</p>
</div>
<form action="#" class="space-y-6">
<!-- Names Row -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1">First Name</label>
<input class="w-full bg-surface-container-high border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="John" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1">Last Name</label>
<input class="w-full bg-surface-container-high border-outline-variant/20 rounded-xl px-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
<input class="w-full bg-surface-container-high border-outline-variant/20 rounded-xl pl-12 pr-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="john.doe@manageit.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
<input class="w-full bg-surface-container-high border-outline-variant/20 rounded-xl pl-12 pr-4 py-3 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary focus:border-primary transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Role Selection -->
<div class="space-y-2">
<label class="text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1">Access Role</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">admin_panel_settings</span>
<select class="w-full bg-surface-container-high border-outline-variant/20 rounded-xl pl-12 pr-10 py-3 text-on-surface appearance-none focus:ring-1 focus:ring-primary focus:border-primary transition-all cursor-pointer">
<option value="StandardUser">StandardUser</option>
<option value="Admin">Admin</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
<p class="text-[10px] text-on-tertiary-fixed-variant italic px-1">Administrators have full system oversight and user management privileges.</p>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary py-4 rounded-xl text-on-primary font-bold text-sm uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary/10" type="submit">
                            registerUser()
                        </button>
</div>
<div class="flex items-center justify-center gap-2 mt-6">
<span class="text-on-surface-variant text-sm">Already have an account?</span>
<a class="text-primary font-semibold text-sm hover:underline" href="#">Log in</a>
</div>
</form>
<!-- Subtle Decorative Element -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
</div>
</main>
<!-- Footer Visual (Asymmetric Bento Element) -->
<footer class="max-w-md mx-auto w-full px-6 mb-12">
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-low p-4 rounded-2xl border border-white/5 flex flex-col justify-between">
<span class="material-symbols-outlined text-primary mb-2">verified_user</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">AuthService Secure</span>
</div>
<div class="bg-surface-container-low p-4 rounded-2xl border border-white/5 flex flex-col justify-between">
<span class="material-symbols-outlined text-tertiary mb-2">api</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">API V2.4 Ready</span>
</div>
</div>
</footer>
</div>

<div class="fixed top-0 right-0 w-1/3 h-full overflow-hidden opacity-10 pointer-events-none hidden lg:block">

</div>
</body></html>
