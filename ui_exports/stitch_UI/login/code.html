<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ManageIt - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "on-surface-variant": "#bbcabf",

              "inverse-primary": "#006c49",
              "secondary-fixed": "#d5e3fc",
              "outline": "#86948a",
              "tertiary": "#7bd0ff",
              "on-surface": "#dce1fb",
              "surface-bright": "#33394c",
              "surface-container-lowest": "#070d1f",
              "on-secondary-fixed-variant": "#3a485b",
              "on-primary": "#003824",
              "secondary": "#b9c7df",

              "on-tertiary-fixed-variant": "#004c69",
              "on-tertiary-fixed": "#001e2c",

              "on-primary-fixed-variant": "#005236",
              "tertiary-fixed-dim": "#7bd0ff",
              "tertiary-container": "#19aee8",
              "error": "#ffb4ab",
              "surface-container-highest": "#2e3447",
              "surface-container-high": "#23293c",
              "surface-dim": "#0c1324",
              "on-secondary-fixed": "#0d1c2e",
              "surface-container-low": "#151b2d",
              "secondary-fixed-dim": "#b9c7df",
              "on-primary-fixed": "#002113",
              "background": "#0c1324"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(25, 31, 49, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      body {
        background-color: #0c1324;
        background-image: 
          radial-gradient(at 0% 0%, rgba(78, 222, 163, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(123, 208, 255, 0.05) 0px, transparent 50%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- Auth Shell Suppression: Navigation Hidden for Focused Transactional Flow -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Animated Aesthetic Elements (Gradients/Glass Background) -->
<div class="absolute top-1/4 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-24 w-80 h-80 bg-tertiary/10 rounded-full blur-[100px]"></div>
<!-- Brand Identity Container -->
<div class="mb-12 flex flex-col items-center z-10">
<div class="mb-4 flex items-center justify-center h-20 w-20 rounded-full bg-surface-container-highest border border-outline-variant/20 shadow-2xl overflow-hidden">
<img alt="ManageIt Logo" class="w-12 h-12" data-alt="abstract geometric brand logo with emerald green interlocking shapes on a deep dark blue circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxr4FsLgongAu8-Psya77N_ZGsbDBBjQB7sYQd9RP_fCpyZjgdTBr98NygrSPp9S1qW3u-G79YvMvW2gC4JQc4IfeEW5XOXWDXCQu1jhP18sCLOxaKA_kz0EyPhk-YkZQq1miw8rEw6zGROzGOxPzcuk6AvEGi1eqrDO2hnuPqq3MCWH_jTsEKZ7sG7lyiNPxtVvPiJUsUHjkQgvrD5Rps3fPVn12gwi-BIvgbSpT9odJKVJLI0L5o1PAIqv995vl4_3J0Bz1u_CX6"/>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-primary">ManageIt</h1>
<p class="font-body text-on-surface-variant text-sm mt-2 font-medium">Precision Architectural Management</p>
</div>
<!-- Glassmorphic Login Card -->
<div class="w-full max-w-md glass-effect border border-outline-variant/10 rounded-[2rem] p-10 shadow-2xl z-10">
<header class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Welcome Back</h2>
<p class="font-body text-on-surface-variant text-sm mt-1">Access your project ecosystem</p>
</header>
<form action="#" class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high border border-outline-variant/20 rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface placeholder:text-on-secondary-container" id="email" name="email" placeholder="user@architect.it" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="font-label text-xs font-medium text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-high border border-outline-variant/20 rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface placeholder:text-on-secondary-container" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold rounded-xl shadow-[0_4px_24px_rgba(78,222,163,0.3)] active:scale-[0.98] transition-all hover:bg-primary-fixed-dim mt-4" type="submit">
                    Login
                </button>
</form>
<!-- Bottom Links -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Register Now</a>
</p>
</div>
</div>
<!-- Secondary Meta Links -->
<div class="mt-12 flex gap-8 z-10">
<a class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[14px]">shield</span> Privacy
            </a>
<a class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[14px]">help</span> Help Center
            </a>
<a class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[14px]">language</span> English
            </a>
</div>
</main>
<!-- Footer Space / Android Navigation Anchor -->
<div class="h-8 w-full flex justify-center items-center pointer-events-none">
<div class="w-32 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
</div>
</body></html>
